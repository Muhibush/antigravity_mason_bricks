name: feature
description: A new Flutter feature module adhering to the Antigravity Blueprint.
version: 0.1.0+1
environment:
  mason: ">=0.1.0-dev <0.1.0"
vars:
  feature_name:
    type: string
    description: "The name of the feature (e.g. user_profile, product_detail)"
    default: "my_feature"
    prompt: "What is the feature name?"
